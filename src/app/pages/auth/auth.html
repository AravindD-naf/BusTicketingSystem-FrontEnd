<app-navbar></app-navbar>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo-box">
        <svg viewBox="0 0 24 24"><path d="M3 8H21V18C21 19.1 20.1 20 19 20H5C3.9 20 3 19.1 3 18V8ZM3 8L5 4H19L21 8M9 17V20M15 17V20M7 12H9M15 12H17"/></svg>
      </div>
      <h2 class="auth-title">Welcome to BusMate</h2>
      <p class="auth-subtitle">Your journey starts here</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn" [class.active]="activeTab() === 'login'"    (click)="setTab('login')">Login</button>
      <button class="tab-btn" [class.active]="activeTab() === 'register'" (click)="setTab('register')">Sign Up</button>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" *ngIf="errorMsg()">
      ⚠️ {{ errorMsg() }}
    </div>

    <!-- LOGIN FORM -->
    <form *ngIf="activeTab() === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <label class="form-label">
        Email Address
        <input class="form-input" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email.
        </span>
      </label>

      <label class="form-label">
        Password
        <input class="form-input" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        <span class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password must be at least 6 characters.
        </span>
      </label>

      <button type="submit" class="submit-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Login →</span>
        <span *ngIf="loading()">Logging in...</span>
      </button>

      <p class="switch-hint">
        Don't have an account?
        <button type="button" class="link-btn" (click)="setTab('register')">Sign up free</button>
      </p>
    </form>

    <!-- REGISTER FORM -->
    <form *ngIf="activeTab() === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="auth-form">
      <div class="form-row">
        <label class="form-label">
          First Name
          <input class="form-input" formControlName="firstName" placeholder="John" autocomplete="given-name" />
          <span class="field-error" *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched">Required.</span>
        </label>
        <label class="form-label">
          Last Name
          <input class="form-input" formControlName="lastName" placeholder="Doe" autocomplete="family-name" />
          <span class="field-error" *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched">Required.</span>
        </label>
      </div>

      <label class="form-label">
        Email Address
        <input class="form-input" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email.
        </span>
      </label>

      <label class="form-label">
        Phone Number <span class="optional">(optional)</span>
        <input class="form-input" type="tel" formControlName="phone" placeholder="+91 98765 43210" autocomplete="tel" />
      </label>

      <label class="form-label">
        Password
        <input class="form-input" type="password" formControlName="password" placeholder="Min. 6 characters" autocomplete="new-password" />
        <span class="field-error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 6 characters.
        </span>
      </label>

      <label class="form-label">
        Confirm Password
        <input class="form-input" type="password" formControlName="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" />
        <span class="field-error" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">
          Passwords do not match.
        </span>
      </label>

      <button type="submit" class="submit-btn" [disabled]="loading()">
        <span *ngIf="!loading()">Create Account →</span>
        <span *ngIf="loading()">Creating account...</span>
      </button>

      <p class="switch-hint">
        Already have an account?
        <button type="button" class="link-btn" (click)="setTab('login')">Login</button>
      </p>
    </form>
  </div>
</main>

<app-footer></app-footer>
