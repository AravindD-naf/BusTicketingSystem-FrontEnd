<!-- SEATER (armchair viewed from above) -->
@if (seatType === 'seater') {
  <svg width="42" height="44" viewBox="0 0 42 44" fill="none">
    <!-- backrest -->
    <rect x="4" y="1" width="34" height="18" rx="6" [attr.fill]="color"/>
    <rect x="8" y="4" width="26" height="12" rx="3.5" [attr.fill]="highlightColor"/>
    <!-- armrests -->
    <rect x="0" y="16" width="7" height="20" rx="3.5" [attr.fill]="color"/>
    <rect x="35" y="16" width="7" height="20" rx="3.5" [attr.fill]="color"/>
    <!-- cushion -->
    <rect x="7" y="17" width="28" height="18" rx="4" [attr.fill]="color"/>
    <rect x="10" y="20" width="22" height="12" rx="2.5" [attr.fill]="highlightColor"/>
    <!-- legs -->
    <rect x="8" y="34" width="6" height="9" rx="3" [attr.fill]="color"/>
    <rect x="28" y="34" width="6" height="9" rx="3" [attr.fill]="color"/>
    <!-- gender icon overlay -->
    @if (!isBooked && gender === 'M') {
      <svg x="27" y="30" width="13" height="13" viewBox="0 0 24 24" [attr.fill]="genderIconColor">
        <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H5C3.89 1 3 1.89 3 3V21C3 22.11 3.89 23 5 23H19C20.11 23 21 22.11 21 21V9M19 9H14V4H19V9Z"/>
      </svg>
    }
    @if (!isBooked && gender === 'F') {
      <svg x="27" y="30" width="13" height="13" viewBox="0 0 24 24" [attr.fill]="genderIconColor">
        <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM12 7C15.31 7 18 9.69 18 13C18 14.01 17.75 14.97 17.3 15.8L14.5 13H16V11H12.5L10.4 8.9C10.97 8.33 11.43 7.69 11.8 7H12M2.66 7H0.66C0.23 7.39 0 7.91 0 8.5V12C0 13.11 0.89 14 2 14H3.5V16H6V14H7.5C8.61 14 9.5 13.11 9.5 12V8.5C9.5 7.91 9.27 7.39 8.84 7H6.84C6.93 7.78 7.34 8.46 8 8.81V10H4V8.81C4.66 8.46 5.07 7.78 5.16 7H2.66Z"/>
      </svg>
    }
  </svg>
}

<!-- SLEEPER (horizontal berth) -->
@if (seatType === 'sleeper') {
  <svg width="72" height="32" viewBox="0 0 72 32" fill="none">
    <!-- pillow -->
    <rect x="1" y="1" width="18" height="30" rx="5" [attr.fill]="color"/>
    <rect x="4" y="4" width="12" height="24" rx="3" [attr.fill]="highlightColor"/>
    <!-- bed surface -->
    <rect x="18" y="5" width="53" height="22" rx="4" [attr.fill]="color"/>
    <rect x="22" y="8" width="45" height="16" rx="2.5" [attr.fill]="highlightColor"/>
    <!-- gender overlay -->
    @if (!isBooked && gender === 'M') {
      <svg x="55" y="18" width="13" height="13" viewBox="0 0 24 24" [attr.fill]="genderIconColor">
        <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H5C3.89 1 3 1.89 3 3V21C3 22.11 3.89 23 5 23H19C20.11 23 21 22.11 21 21V9M19 9H14V4H19V9Z"/>
      </svg>
    }
    @if (!isBooked && gender === 'F') {
      <svg x="55" y="18" width="13" height="13" viewBox="0 0 24 24" [attr.fill]="genderIconColor">
        <path d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM12 7C15.31 7 18 9.69 18 13C18 14.01 17.75 14.97 17.3 15.8L14.5 13H16V11H12.5L10.4 8.9C10.97 8.33 11.43 7.69 11.8 7H12M2.66 7H0.66C0.23 7.39 0 7.91 0 8.5V12C0 13.11 0.89 14 2 14H3.5V16H6V14H7.5C8.61 14 9.5 13.11 9.5 12V8.5C9.5 7.91 9.27 7.39 8.84 7H6.84C6.93 7.78 7.34 8.46 8 8.81V10H4V8.81C4.66 8.46 5.07 7.78 5.16 7H2.66Z"/>
      </svg>
    }
  </svg>
}
