<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-container">
    <a routerLink="/" class="nav-brand">
      <div class="logo-box">
        <svg viewBox="0 0 24 24"><path d="M3 8H21V18C21 19.1 20.1 20 19 20H5C3.9 20 3 19.1 3 18V8ZM3 8L5 4H19L21 8M9 17V20M15 17V20M7 12H9M15 12H17"/></svg>
      </div>
      BusMate
    </a>

    <div class="nav-links" [class.open]="mobileOpen()">
      <a routerLink="/" class="nav-link">Home</a>
      <a class="nav-link" style="cursor:pointer" (click)="goToSearch()">Search Buses</a>

      @if (auth.isAuthenticated()) {
        @if (auth.user()?.role !== 'Admin') {
          <a routerLink="/my-bookings" class="nav-link">My Bookings</a>
        }
        @if (auth.user()?.role === 'Admin') {
          <a routerLink="/admin" class="nav-link admin-link">Admin Panel</a>
        }
        <div class="nav-user-menu">
          <a routerLink="/profile" class="user-profile">
            <div class="profile-avatar">{{ getInitials() }}</div>
            <span class="user-name">{{ auth.user()?.name}}</span>
          </a>
          <button class="btn-logout" (click)="logout()">
            <svg viewBox="0 0 24 24" width="13" height="13"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Logout
          </button>
        </div>
      } @else {
        <a routerLink="/auth" [queryParams]="{tab:'login'}" class="btn-login">Login</a>
        <a routerLink="/auth" [queryParams]="{tab:'register'}" class="btn-register">Sign Up</a>
      }
    </div>

    <button class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle menu">
      <span class="ham-line"></span>
      <span class="ham-line"></span>
      <span class="ham-line"></span>
    </button>
  </div>
</nav>
