<form class="search-card" [formGroup]="searchForm" (ngSubmit)="onSearch()">
  <div class="search-card-header">
    <h3>Find Your Bus</h3>
    <p>Search from 500+ routes across India</p>
  </div>

  <div class="from-to-row">
    <div class="form-row">
      <div class="form-group">
        <label>FROM</label>
        <input
          type="text"
          placeholder="Chennai"
          formControlName="from"
          [class.input-error]="searchForm.get('from')?.invalid && searchForm.get('from')?.touched"
        />
        <span class="field-error" *ngIf="searchForm.get('from')?.invalid && searchForm.get('from')?.touched">
          Please enter origin city
        </span>
      </div>
      <div class="form-group">
        <label>TO</label>
        <input
          type="text"
          placeholder="Bangalore"
          formControlName="to"
          [class.input-error]="searchForm.get('to')?.invalid && searchForm.get('to')?.touched"
        />
        <span class="field-error" *ngIf="searchForm.get('to')?.invalid && searchForm.get('to')?.touched">
          Please enter destination city
        </span>
      </div>
    </div>
    <button type="button" class="swap-btn" (click)="swapCities()">⇄</button>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>DATE</label>
      <input
        type="date"
        id="travel-date"
        formControlName="date"
        [class.input-error]="searchForm.get('date')?.invalid && searchForm.get('date')?.touched"
      />
      <span class="field-error" *ngIf="searchForm.get('date')?.invalid && searchForm.get('date')?.touched">
        Please select a travel date
      </span>
    </div>
    <div class="form-group">
      <label>PASSENGERS</label>
      <select formControlName="passengers">
        <option [value]="1">1 Adult</option>
        <option [value]="2">2 Adults</option>
        <option [value]="3">3 Adults</option>
        <option [value]="4">4 Adults</option>
        <option [value]="5">5 Adults</option>
        <option [value]="6">6 Adults</option>
      </select>
    </div>
  </div>

  <button class="search-btn" type="submit">🔍 Search Buses</button>
</form>
