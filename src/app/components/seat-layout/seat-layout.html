<div class="seat-grid">
  @for (row of rows; track $index) {
    <div class="seat-row-bus">
      @for (seat of row; track seat?.seatId ?? $index) {
        @if (seat) {
          <div class="seat-cell" [ngClass]="getSeatClass(seat)" (click)="onSeatClick(seat)">
            <div class="seat-svg-wrap">
              <app-seat-icon
                [seatType]="seat.type"
                [color]="seatService.getSeatColor(seat)"
                [gender]="seat.gender"
                [isBooked]="seat.status === 'booked'">
              </app-seat-icon>
            </div>
            <div class="seat-label" [class.sold]="seat.status === 'booked'" [class.selected-lbl]="seatService.isSelected(seat.seatId)">
              {{ seat.num }}
            </div>
          </div>
        } @else {
          <div class="aisle-gap"></div>
        }
      }
    </div>
  }
</div>
