<aside class="sidebar">

  <!-- ── FILTER HEADER ── -->
  <div class="sidebar-head">
    <div class="sidebar-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filters
    </div>
    <div class="sidebar-head-right">
      <span class="filter-count" *ngIf="selectedTypes.length + selectedTimes.length + selectedOperators.length > 0">
        {{ selectedTypes.length + selectedTimes.length + selectedOperators.length }} active
      </span>
      <button class="clear-btn" (click)="clearAll()">Clear all</button>
    </div>
  </div>

  <!-- Bus Type -->
  <div class="filter-section">
    <div class="filter-title">Bus Type</div>
    <div class="check-group">
      <div class="check-item" *ngFor="let type of busTypes">
        <label>
          <input type="checkbox"
                 [checked]="selectedTypes.includes(type)"
                 (change)="toggleType(type)"/> {{ type }}
        </label>
        <span class="check-count">—</span>
      </div>
    </div>
  </div>

  <!-- Price Range -->
  <div class="filter-section">
    <div class="filter-title">Price Range</div>
    <div class="price-range-wrap">
      <div class="price-labels">
        <span>₹400</span>
        <span>₹{{ maxPrice | number:'1.0-0':'en-IN' }}</span>
      </div>
      <input type="range" class="price-slider" min="400" max="3000" [value]="maxPrice"
       [style.background]="'linear-gradient(to right, var(--navy) ' + sliderPercent + '%, var(--border) ' + sliderPercent + '%)'"
       (input)="maxPrice = ($event.target).valueAsNumber"
       (change)="onPriceChange(($event.target).valueAsNumber)"/>
    </div>
  </div>

  <!-- Departure Time -->
  <div class="filter-section">
    <div class="filter-title">Departure Time</div>
    <div class="time-grid">
      <div class="time-chip"
           *ngFor="let t of departureTimes"
           [class.selected]="selectedTimes.includes(t.key)"
           (click)="toggleTime(t.key)">
        <div class="tc-icon">{{ t.icon }}</div>
        <div class="tc-label">{{ t.label }}</div>
        <div class="tc-time">{{ t.range }}</div>
      </div>
    </div>
  </div>

  <!-- Ratings -->
  <div class="filter-section">
    <div class="filter-title">Ratings</div>
    <div class="star-group">
      <div class="star-item" [class.selected]="minRating===5" (click)="setRating(5)">
        <div class="stars">★★★★★</div>
        <span class="star-label">5★ only</span>
      </div>
      <div class="star-item" [class.selected]="minRating===4" (click)="setRating(4)">
        <div class="stars">★★★★☆</div>
        <span class="star-label">4★ & above</span>
      </div>
      <div class="star-item" [class.selected]="minRating===3" (click)="setRating(3)">
        <div class="stars">★★★☆☆</div>
        <span class="star-label">3★ & above</span>
      </div>
    </div>
  </div>

  <!-- Operators -->
  <div class="filter-section" *ngIf="operators().length > 0">
    <div class="filter-title">Bus Operators</div>
    <div class="operator-list">
      <label class="op-item" *ngFor="let op of operators()">
        <input type="checkbox"
              [checked]="selectedOperators.includes(op)"
              (change)="selectedOperators = ($event.target).checked
                        ? [...selectedOperators, op]
                        : selectedOperators.filter(o => o !== op); applyFilter();">
        {{ op }}
      </label>
    </div>
  </div>

</aside>
